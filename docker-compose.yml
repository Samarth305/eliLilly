version: '3.8'

services:
  backend:
    build: ./backend
    container_name: git-storyteller-backend
    ports:
      - "8000:8000"
    env_file:
      - ./backend/.env
    environment:
      - DB_PATH=/app/data/repository_cache.db
    volumes:
      - ./backend/data:/app/data
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: always

  frontend:
    build: ./frontend
    container_name: git-storyteller-frontend
    ports:
      - "5173:80"
    depends_on:
      - backend
    restart: always
